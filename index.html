<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光えび - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanlines"></div>
    <header class="hero section">
        <div class="avatar-container">
            <img src="avatar.png" alt="光えびのアバター" class="avatar pixelated">
        </div>
        <h1 class="glitch" data-text="光えび">光えび</h1>
        <p class="subtitle">Minecrafter / Creator</p>
    </header>

    <main>
        <section class="section hidden">
            <h2><span class="icon">✨</span> ABOUT ME</h2>
            <div class="card">
                <p><strong>ハンドルネーム:</strong> 光えび</p>
                <p><strong>得意なこと:</strong> マイクラ建築 🧱</p>
                <p><strong>興味があること:</strong> メタバース 🌐</p>
            </div>
        </section>

        <section class="section hidden">
            <h2><span class="icon">🤖</span> AI & ME</h2>
            <div class="card">
                <h3>自分にとってAIとは？</h3>
                <p>やりたいことを補助してくれる道具のような存在です。</p>
            </div>
            <div class="card">
                <h3>今後AIとどう向き合いたいか？</h3>
                <p>道具ではなく、パートナーとして向き合いたいです。</p>
            </div>
        </section>

        <section class="section hidden">
            <h2><span class="icon">🚀</span> FUTURE</h2>
            <div class="card">
                <h3>この授業を通して挑戦したいこと</h3>
                <p>自分の創造力を伸ばしたいです。</p>
            </div>
        </section>
    </main>

    <footer class="section hidden">
        <p>© 2026 光えび. Welcome to the Cyber City.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
